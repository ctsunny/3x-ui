<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="generator" content="PHP/8.1.2">
  <title>{{ .host }} – Web Management</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;font-size:13px;background:#d0d0d0;color:#333}
    a{color:#0066cc;text-decoration:none}
    a:hover{text-decoration:underline}
    #page-wrapper{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    #login-box{background:#fff;border:1px solid #aaa;border-radius:3px;width:100%;max-width:400px;box-shadow:2px 2px 5px rgba(0,0,0,.2)}
    #login-box .header{background:#f0f0f0;border-bottom:1px solid #ccc;padding:10px 16px;display:flex;align-items:center;gap:8px}
    #login-box .header img{width:24px;height:24px}
    #login-box .header h1{font-size:15px;font-weight:bold;color:#444}
    #login-box .body{padding:20px}
    #login-box .body p.desc{margin-bottom:14px;color:#555;font-size:12px;line-height:1.6}
    #msg-box{margin-bottom:12px;padding:8px 10px;border-radius:2px;font-size:12px;display:none}
    #msg-box.error{background:#fde8e8;border:1px solid #f5c6c6;color:#a00}
    #msg-box.success{background:#e8f5e9;border:1px solid #c8e6c9;color:#2a6}
    .form-row{margin-bottom:12px}
    .form-row label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:bold}
    .form-row input{width:100%;padding:6px 8px;border:1px solid #bbb;border-radius:2px;font-size:13px;background:#fff;color:#333;outline:none}
    .form-row input:focus{border-color:#5a9;box-shadow:0 0 3px rgba(80,160,100,.3)}
    .form-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:16px}
    .btn-submit{padding:6px 18px;background:#4a7;border:1px solid #3a6;color:#fff;font-size:13px;border-radius:2px;cursor:pointer}
    .btn-submit:hover{background:#3a6}
    .btn-submit:disabled{background:#9bb;border-color:#8aa;cursor:not-allowed}
    #footer{margin-top:10px;font-size:11px;color:#777;text-align:center}
    #footer a{color:#777}
  </style>
</head>
<body>
<div id="page-wrapper">
  <div id="login-box">
    <div class="header">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="3" fill="#4a7"/>
        <path d="M6 8h12M6 12h12M6 16h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <h1>Web Management Console</h1>
    </div>
    <div class="body">
      <p class="desc">Enter your administrator credentials to access the management console.</p>
      <div id="msg-box"></div>
      <form id="login-form" autocomplete="on" onsubmit="doLogin(event)">
        <div class="form-row">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" autofocus required placeholder="admin">
        </div>
        <div class="form-row">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">
        </div>
        <div class="form-row" id="twofa-row" style="display:none">
          <label for="twoFactorCode">Verification Code</label>
          <input type="text" id="twoFactorCode" name="twoFactorCode" autocomplete="one-time-code" placeholder="6-digit code" maxlength="8" inputmode="numeric">
        </div>
        <div class="form-actions">
          <span id="spinner" style="display:none;font-size:11px;color:#777">Authenticating…</span>
          <button type="submit" class="btn-submit" id="submit-btn">Log In</button>
        </div>
      </form>
    </div>
  </div>
  <div id="footer">
    Powered by <a href="#">PHP/8.1.2</a> &bull; <a href="#">Server Management</a>
  </div>
</div>
<script>
(function () {
  'use strict';

  var basePath = '{{ .base_path }}';

  function showMsg(text, type) {
    var el = document.getElementById('msg-box');
    el.textContent = text;
    el.className = type === 'error' ? 'error' : 'success';
    el.style.display = 'block';
  }

  function hideMsg() {
    var el = document.getElementById('msg-box');
    el.style.display = 'none';
  }

  function setLoading(on) {
    document.getElementById('submit-btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'inline' : 'none';
  }

  function checkTwoFactor() {
    var xhr = new XMLHttpRequest();
    xhr.open('POST', basePath + 'getTwoFactorEnable', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function () {
      try {
        var resp = JSON.parse(xhr.responseText);
        if (resp.success && resp.obj === true) {
          document.getElementById('twofa-row').style.display = 'block';
        }
      } catch (e) { /* ignore */ }
    };
    xhr.send('{}');
  }

  window.doLogin = function (e) {
    e.preventDefault();
    hideMsg();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value.trim();
    var twoFactorCode = document.getElementById('twoFactorCode').value.trim();
    if (!username) { showMsg('Username is required.', 'error'); return; }
    if (!password) { showMsg('Password is required.', 'error'); return; }
    setLoading(true);
    var payload = JSON.stringify({ username: username, password: password, twoFactorCode: twoFactorCode });
    var xhr = new XMLHttpRequest();
    xhr.open('POST', basePath + 'login', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.onload = function () {
      setLoading(false);
      try {
        var resp = JSON.parse(xhr.responseText);
        if (resp.success) {
          window.location.href = basePath + 'panel/';
        } else {
          showMsg(resp.msg || 'Invalid credentials.', 'error');
        }
      } catch (e) {
        showMsg('An unexpected error occurred.', 'error');
      }
    };
    xhr.onerror = function () {
      setLoading(false);
      showMsg('Network error. Please try again.', 'error');
    };
    xhr.send(payload);
  };

  document.addEventListener('DOMContentLoaded', checkTwoFactor);
}());
</script>
</body>
</html>
